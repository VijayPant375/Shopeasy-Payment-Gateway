<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful - ShopEasy</title>
    <!-- Prevent dark mode flash on load -->
<script>
  const t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
</script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <nav class="navbar">
      <div class="logo">🛍️ ShopEasy</div>
      <div class="nav-right">
        <span class="nav-tagline">Secured by Stripe</span>
        <button class="theme-toggle" id="themeToggle">🌙</button>
      </div>
    </nav>

    <div class="success-container">
      <div class="success-card">
        <div class="success-icon">✅</div>
        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-subtitle">Your order is confirmed. Thank you for shopping with us!</p>

        <div class="order-details">
          <div class="order-row">
            <span class="order-label">Payment ID</span>
            <span class="order-value" id="paymentId">Loading...</span>
          </div>
          <div class="order-row">
            <span class="order-label">Status</span>
            <span class="order-value status-badge">Confirmed ✅</span>
          </div>
        </div>

        <a href="/" class="back-btn">← Continue Shopping</a>
      </div>
    </div>

    <footer class="footer">
      <p>© 2025 ShopEasy · All payments secured by Stripe · Test Mode</p>
    </footer>

    <script src="success.js"></script>
  </body>
</html>
